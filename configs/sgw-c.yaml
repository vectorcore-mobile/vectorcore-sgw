sgwc:
  node_id: "sgw-c-1"
  plmn:
    mcc: "311"
    mnc: "435"

interfaces:
  control:
    # "sgwinterface" is an operator-chosen logical name. It can be any
    # YAML key; gtpc.s11.bind and gtpc.s5c.bind below reference this name.
    sgwinterface:
      listen: "10.90.250.59:2123"

gtpc:
  s11:
    # Bind S11 to interfaces.control.sgwinterface.
    bind: "sgwinterface"
  s5c:
    # Bind S5/S8-C to interfaces.control.sgwinterface. 
    bind: "sgwinterface"
  create_bearer_retry_guard:
    enabled: true
  transaction_collision:
    # strict: reject unsafe overlaps; permissive: allow bearer-scoped unknown-EBI overlaps.
    mode: "strict"
    active_procedure_timeout_seconds: 120
  nsa_dcnr:
    enabled: true
    forward_secondary_rat_usage_reports: true
  peer_health:
    enabled: true
    echo_interval_seconds: 30
    echo_timeout_seconds: 3
    suspect_after_missed: 2
    down_after_missed: 3
    degraded_rtt_ms: 500
    probe_mme_peers: true
    probe_pgw_peers: true
    warn_on_down_peer_procedure: true

s11:
  t3_response_seconds: 3
  n3_requests: 5

pfcp:
  local_addr: "127.0.0.1:8805"
  heartbeat_interval_seconds: 10
  heartbeat_timeout_seconds: 30
  sgwu:
    - name: "sgw-u-1"
      node_id: "sgw-u-1"
      addr: "127.0.0.2:8805"

qos:
  outer_marking:
    enabled: true
    gtpc:
      enabled: true
      dscp: 24
    pfcp:
      enabled: true
      dscp: 40

logging:
  level: info
  file: /var/log/vectorcore/sgw/sgw-c.log

api:
  listen: "0.0.0.0:8080"

metrics:
  listen: "0.0.0.0:9090"

shutdown:
  timeout_seconds: 5
