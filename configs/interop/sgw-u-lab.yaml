sgwu:
  node_id: "sgw-u-lab"

pfcp:
  listen: "10.90.250.11:8805"
  allowed_sgwc:
    - "10.90.250.10"

interfaces:
  user:
    # Logical names are operator-chosen labels. gtpu.*.bind references them.
    lab_user_plane:
      ifname: "eth0"
      listen: "10.90.250.11:2152"

gtpu:
  s1u:
    bind: "lab_user_plane"
  s5u:
    bind: "lab_user_plane"

qos:
  outer_marking:
    enabled: true
    gtpu:
      enabled: true
      dscp: 0
    pfcp:
      enabled: true
      dscp: 40
  qci_marking:
    enabled: true
    override_default_gtpu: true
    default_gtpu_dscp: 0
    unknown_teid_dscp: 0
    trust_inner_dscp: false
    qci_to_dscp:
      1: 46
      2: 34
      3: 26
      4: 26
      5: 40
      6: 18
      7: 26
      8: 0
      9: 0

dataplane:
  # xdp-generic works in VMs; xdp-native requires NIC driver support.
  driver_mode: "xdp-generic"
  unknown_teid: "punt"
  attach_on_start: true
  cleanup_on_exit: true
  map_max_entries: 65536

logging:
  level: info
  file: /var/log/vectorcore/sgw/sgw-u-lab.log

api:
  listen: "0.0.0.0:8081"

metrics:
  listen: "0.0.0.0:9091"

shutdown:
  timeout_seconds: 5
