sgwc:
  node_id: "sgw-c-lab"
  plmn: {mcc: "001", mnc: "01"}
  control_plane_ip: "10.90.250.10"
interfaces:
  control:
    lab_control:
      listen: "10.90.250.10:2123"
gtpc:
  s11:
    bind: "lab_control"
    timers: {t3_response_seconds: 3, n3_requests: 5}
  s5c:
    bind: "lab_control"
  transactions:
    create_bearer_retry_guard: {enabled: true}
    collision_handling: {mode: "strict", active_procedure_timeout_seconds: 120}
  peer_health:
    enabled: true
    timers: {echo_interval_seconds: 30, echo_timeout_seconds: 3}
    thresholds: {suspect_after_missed: 2, down_after_missed: 3, degraded_rtt_ms: 500}
    probe: {mme: true, pgw: true}
    warn_on_down_peer_procedure: true
pfcp:
  local_addr: "10.90.250.10:8805"
  heartbeat: {interval_seconds: 10, timeout_seconds: 30}
  sgwu:
    - {name: "sgw-u-lab", node_id: "sgw-u-lab", addr: "10.90.250.11:8805"}
features:
  nsa_dcnr: {enabled: true, forward_secondary_rat_usage_reports: true}
qos:
  outer_marking:
    enabled: true
    gtpc: {enabled: true, dscp: 40}
    pfcp: {enabled: true, dscp: 40}
logging: {level: info, file: /var/log/vectorcore/sgw/sgw-c-lab.log}
api: {listen: "0.0.0.0:8080"}
metrics: {listen: "0.0.0.0:9090"}
shutdown: {timeout_seconds: 5}
