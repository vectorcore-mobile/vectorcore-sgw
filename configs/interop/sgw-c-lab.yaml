sgwc:
  node_id: "sgw-c-lab"
  plmn:
    mcc: "001"
    mnc: "01"
  control_plane_ip: "10.90.250.10"

interfaces:
  control:
    # Logical names are operator-chosen labels. gtpc.*.bind references them.
    lab_control:
      listen: "10.90.250.10:2123"

gtpc:
  s11:
    bind: "lab_control"
  s5c:
    bind: "lab_control"
  nsa_dcnr:
    enabled: true
    forward_secondary_rat_usage_reports: true
  peer_health:
    enabled: true
    echo_interval_seconds: 30
    echo_timeout_seconds: 3
    suspect_after_missed: 2
    down_after_missed: 3
    degraded_rtt_ms: 500
    probe_mme_peers: true
    probe_pgw_peers: true
    warn_on_down_peer_procedure: true
  pgw_failure:
    enabled: true
    mark_sessions_on_path_down: true
    mark_sessions_on_restart: true
    block_new_procedures_to_down_pgw: false
    notify_mme_on_pgw_restart: false

s11:
  t3_response_seconds: 3
  n3_requests: 5

pfcp:
  local_addr: "10.90.250.10:8805"
  heartbeat_interval_seconds: 10
  heartbeat_timeout_seconds: 30
  sgwu:
    - name: "sgw-u-lab"
      node_id: "sgw-u-lab"
      addr: "10.90.250.11:8805"

qos:
  outer_marking:
    enabled: true
    gtpc:
      enabled: true
      dscp: 40
    pfcp:
      enabled: true
      dscp: 40

logging:
  level: info
  file: /var/log/vectorcore/sgw/sgw-c-lab.log

api:
  listen: "0.0.0.0:8080"

metrics:
  listen: "0.0.0.0:9090"

shutdown:
  timeout_seconds: 5
