sgwu:
  node_id: "sgw-u-1"

pfcp:
  listen: "127.0.0.2:8805"
  allowed_sgwc:
    - "127.0.0.1"

interfaces:
  user:
    # "sgwinterface" is an operator-chosen logical name. It can be any
    # YAML key; gtpu.s1u.bind and gtpu.s5u.bind below reference this name.
    sgwinterface:
      ifname: "eth0"
      listen: "10.90.250.59:2152"

gtpu:
  s1u:
    # Bind S1-U to interfaces.user.sgwinterface.
    bind: "sgwinterface"
  s5u:
    # Bind S5/S8-U to interfaces.user.sgwinterface.
    bind: "sgwinterface"

dataplane:
  # xdp-generic attaches XDP in SKB/generic mode and works in VMs.
  # xdp-native attaches in the NIC driver's XDP path when the driver supports it.
  # xdp-offload is reserved for NIC hardware offload validation.
  driver_mode: "xdp-generic"
  unknown_teid: "punt"
  attach_on_start: true
  cleanup_on_exit: true
  map_max_entries: 65536

logging:
  level: info
  file: /var/log/vectorcore/sgw/sgw-u.log

api:
  listen: "0.0.0.0:8081"

metrics:
  listen: "0.0.0.0:9091"

shutdown:
  timeout_seconds: 5
