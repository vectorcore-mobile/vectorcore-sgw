sgwc:
  node_id: "sgw-c-1"
  plmn:
    mcc: "311"
    mnc: "435"

interfaces:
  control:
    # Logical names are operator-chosen labels. gtpc.*.bind references them.
    my_control_plane:
      listen: "10.90.250.59:2123"

gtpc:
  s11:
    bind: "my_control_plane"
  s5c:
    bind: "my_control_plane"

s11:
  t3_response_seconds: 3
  n3_requests: 5

pfcp:
  local_addr: "127.0.0.1:8805"
  heartbeat_interval_seconds: 10
  heartbeat_timeout_seconds: 30
  sgwu:
    - name: "sgw-u-east"
      node_id: "sgw-u-east"
      addr: "127.0.0.2:8805"
    - name: "sgw-u-west"
      node_id: "sgw-u-west"
      addr: "127.0.0.3:8805"

qos:
  outer_marking:
    enabled: true
    gtpc:
      enabled: true
      dscp: 40
    pfcp:
      enabled: true
      dscp: 40

logging:
  level: info

api:
  listen: "0.0.0.0:8080"

metrics:
  listen: "0.0.0.0:9090"

shutdown:
  timeout_seconds: 5
