sgwu:
  node_id: "sgw-u-1"

# Rework Phase 1 schema example. Runtime support for sharing one Linux
# interface between S1-U and S5/S8-U is completed in Rework Phase 2.

pfcp:
  listen: "127.0.0.2:8805"
  allowed_sgwc:
    - "127.0.0.1"

interfaces:
  user:
    # Logical names are operator-chosen labels. gtpu.*.bind references them.
    my_user_plane:
      ifname: "eth0"
      listen: "10.90.250.59:2152"

gtpu:
  s1u:
    bind: "my_user_plane"
  s5u:
    bind: "my_user_plane"

qos:
  outer_marking:
    enabled: true
    gtpu:
      enabled: true
      dscp: 0
    pfcp:
      enabled: true
      dscp: 40

dataplane:
  # xdp-generic works in VMs; xdp-native requires NIC driver support.
  driver_mode: "xdp-generic"
  unknown_teid: "punt"
  attach_on_start: true
  cleanup_on_exit: true
  map_max_entries: 65536

logging:
  level: info
  file: /var/log/vectorcore/sgw/sgw-u.log

api:
  listen: "0.0.0.0:8081"

metrics:
  listen: "0.0.0.0:9091"

shutdown:
  timeout_seconds: 5
